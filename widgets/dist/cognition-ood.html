    <script id="rl-core">/*
 * rl-dynamics — JS core.
 *
 * A small, dependency-free mirror of the deterministic maths in the Python
 * package `rl_dynamics` (policy gradients + N=3 simplex geometry), so the
 * interactive widgets compute the same quantities as the figure generators.
 *
 * The Python package is the source of truth; `RLDyn.selfTest(fixtures)` checks
 * this mirror against Python-generated fixtures at load time (see
 * widgets/gen_fixtures.py). Stochastic RLOO *sampling* is intentionally not
 * mirrored (RNG streams differ across implementations); the RLOO *formula* is,
 * via `rlooFromCounts`.
 */
const RLDyn = (function () {
  "use strict";

  // ---- policy / gradients ------------------------------------------------
  function softmax(L) {
    const m = Math.max.apply(null, L);
    const e = L.map((x) => Math.exp(x - m));
    const s = e.reduce((a, b) => a + b, 0);
    return e.map((x) => x / s);
  }

  function expectedReward(pi, R) {
    return pi.reduce((a, p, i) => a + p * R[i], 0);
  }

  function fullGradient(pi, R) {
    const er = expectedReward(pi, R);
    return pi.map((p, i) => p * (R[i] - er));
  }

  // ghat_i = (1/G) N_i (R_i - Rbar),  Rbar = (1/G) sum_i N_i R_i
  function rlooFromCounts(counts, R) {
    const G = counts.reduce((a, b) => a + b, 0);
    const Rbar = counts.reduce((a, c, i) => a + c * R[i], 0) / G;
    const ghat = counts.map((c, i) => (c * (R[i] - Rbar)) / G);
    return { ghat, Rbar };
  }

  function _matVec(M, v) {
    return M.map((row) => row.reduce((a, m, k) => a + m * v[k], 0));
  }
  function _matTVec(M, v) {
    // (M^T v)_k = sum_i M[i][k] v[i]
    const out = new Array(M[0].length).fill(0);
    for (let i = 0; i < M.length; i++)
      for (let k = 0; k < M[i].length; k++) out[k] += M[i][k] * v[i];
    return out;
  }

  // L <- L + eta A A^T ghat ; A === null is the identity fast path.
  function logitStep(L, ghat, eta, A) {
    if (!A) return L.map((l, i) => l + eta * ghat[i]);
    const coupled = _matVec(A, _matTVec(A, ghat));
    return L.map((l, i) => l + eta * coupled[i]);
  }

  // ---- N=3 simplex geometry ---------------------------------------------
  const H = Math.sqrt(3) / 2; // triangle height
  const V = [
    [0.5, H],
    [0.0, 0.0],
    [1.0, 0.0],
  ]; // vertices v1 (top), v2 (bottom-left), v3 (bottom-right)

  function toXY(pi) {
    return [
      pi[0] * V[0][0] + pi[1] * V[1][0] + pi[2] * V[2][0],
      pi[0] * V[0][1] + pi[1] * V[1][1] + pi[2] * V[2][1],
    ];
  }

  // Barycentric coordinates of (x, y) w.r.t. the reference triangle.
  function fromXY(x, y) {
    const [x1, y1] = V[0];
    const [x2, y2] = V[1];
    const [x3, y3] = V[2];
    const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
    const a = ((y2 - y3) * (x - x3) + (x3 - x2) * (y - y3)) / det;
    const b = ((y3 - y1) * (x - x3) + (x1 - x3) * (y - y3)) / det;
    return [a, b, 1 - a - b];
  }

  // Orthogonal distance to the edge opposite each vertex: pi_i * H.
  function edgeDistances(pi) {
    return pi.map((p) => p * H);
  }

  // Foot of the perpendicular from P onto the line through A and B.
  function footOnEdge(P, A, B) {
    const abx = B[0] - A[0],
      aby = B[1] - A[1];
    const t = ((P[0] - A[0]) * abx + (P[1] - A[1]) * aby) / (abx * abx + aby * aby);
    return [A[0] + t * abx, A[1] + t * aby];
  }

  // The edge (as [A, B] vertices) opposite vertex i.
  function oppositeEdge(i) {
    const others = [0, 1, 2].filter((k) => k !== i);
    return [V[others[0]], V[others[1]]];
  }

  // Project a point onto the probability simplex (clamp negatives, renormalise).
  function clampToSimplex(pi) {
    const c = pi.map((p) => Math.max(0, p));
    const s = c.reduce((a, b) => a + b, 0);
    if (s <= 0) return [1 / 3, 1 / 3, 1 / 3];
    return c.map((p) => p / s);
  }

  // ---- parity self-test --------------------------------------------------
  function _close(a, b, tol) {
    tol = tol || 1e-9;
    if (Array.isArray(a))
      return a.length === b.length && a.every((x, i) => _close(x, b[i], tol));
    return Math.abs(a - b) <= tol;
  }

  function selfTest(fx) {
    const fails = [];
    const check = (name, got, want) => {
      if (!_close(got, want, 1e-6)) fails.push({ name, got, want });
    };
    for (const c of fx.softmax) check("softmax", softmax(c.L), c.pi);
    for (const c of fx.fullGradient)
      check("fullGradient", fullGradient(c.pi, c.R), c.ghat);
    for (const c of fx.rlooFromCounts) {
      const r = rlooFromCounts(c.counts, c.R);
      check("rloo.ghat", r.ghat, c.ghat);
      check("rloo.Rbar", r.Rbar, c.Rbar);
    }
    for (const c of fx.logitStep)
      check("logitStep", logitStep(c.L, c.ghat, c.eta, c.A || null), c.out);
    for (const c of fx.toXY) check("toXY", toXY(c.pi), c.xy);
    for (const c of fx.fromXY) check("fromXY", fromXY(c.xy[0], c.xy[1]), c.pi);
    for (const c of fx.edgeDistances)
      check("edgeDistances", edgeDistances(c.pi), c.d);
    const ok = fails.length === 0;
    if (ok) console.log("[RLDyn] self-test passed (JS matches Python reference)");
    else console.error("[RLDyn] self-test FAILED", fails);
    return { ok, fails };
  }

  return {
    softmax,
    expectedReward,
    fullGradient,
    rlooFromCounts,
    logitStep,
    H,
    V,
    toXY,
    fromXY,
    edgeDistances,
    footOnEdge,
    oppositeEdge,
    clampToSimplex,
    selfTest,
  };
})();

if (typeof module !== "undefined" && module.exports) module.exports = RLDyn;
</script>
    <script id="rl-render">/*
 * rl-dynamics — SVG string builders for widgets.
 *
 * Mirrors the conventions of the Python `rl_dynamics.svg` module: each helper
 * returns an SVG element as a string, which the widget assembles and injects
 * via innerHTML. Keeps rendering declarative and re-runnable on every state
 * change.
 */
const RLRender = (function () {
  "use strict";

  function fmt(x, ndigits) {
    if (ndigits === undefined) ndigits = 3;
    if (x === 0) x = 0;
    let s = x.toFixed(ndigits).replace(/\.?0+$/, "");
    return s === "" || s === "-" ? "0" : s;
  }

  function attrs(o) {
    const parts = [];
    for (const key in o) {
      const val = o[key];
      if (val === null || val === undefined) continue;
      const name = key.replace(/_/g, "-");
      parts.push(`${name}="${typeof val === "number" ? fmt(val) : val}"`);
    }
    return parts.join(" ");
  }

  const pts = (arr) => arr.map((p) => `${fmt(p[0])},${fmt(p[1])}`).join(" ");

  return {
    fmt,
    attrs,
    line: (x1, y1, x2, y2, o) =>
      `<line ${attrs(Object.assign({ x1, y1, x2, y2 }, o))} />`,
    polyline: (arr, o) =>
      `<polyline points="${pts(arr)}" ${attrs(Object.assign({ fill: "none" }, o))} />`,
    polygon: (arr, o) => `<polygon points="${pts(arr)}" ${attrs(o)} />`,
    path: (d, o) => `<path d="${d}" ${attrs(o)} />`,
    circle: (cx, cy, r, o) =>
      `<circle ${attrs(Object.assign({ cx, cy, r }, o))} />`,
    text: (x, y, s, o) => `<text ${attrs(Object.assign({ x, y }, o))}>${s}</text>`,
    g: (body, o) => `<g ${attrs(o)}>${body}</g>`,
  };
})();

if (typeof module !== "undefined" && module.exports) module.exports = RLRender;
</script>
    <script id="rl-data">
      const RL_FIXTURES = {"softmax":[{"L":[2.0,-1.0,0.5],"pi":[0.7855970345892759,0.039112573270687456,0.1752903921400367]},{"L":[0.0,0.0,0.0],"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333]},{"L":[3.0,3.0,-2.0],"pi":[0.4983211691867487,0.4983211691867487,0.0033576616265026146]}],"fullGradient":[{"pi":[0.9,0.05,0.05],"R":[0.0,1.0,1.0],"ghat":[-0.09000000000000001,0.045000000000000005,0.045000000000000005]},{"pi":[0.2,0.5,0.3],"R":[0.0,1.0,2.0],"ghat":[-0.22000000000000003,-0.050000000000000044,0.26999999999999996]}],"rlooFromCounts":[{"counts":[5,2,1],"R":[0.0,1.0,1.0],"ghat":[-0.234375,0.15625,0.078125],"Rbar":0.375},{"counts":[3,3,2],"R":[0.0,1.0,2.0],"ghat":[-0.328125,0.046875,0.28125],"Rbar":0.875}],"logitStep":[{"L":[0.2,-0.1,0.5],"ghat":[0.1,-0.05,-0.05],"eta":0.3,"A":null,"out":[0.23,-0.115,0.485]},{"L":[0.2,-0.1,0.5],"ghat":[0.1,-0.05,-0.05],"eta":0.3,"A":[[1.0,0.5,0.0],[0.0,1.0,0.0],[0.2,0.0,1.0]],"out":[0.227,-0.1,0.4904]}],"toXY":[{"pi":[0.2,0.5,0.3],"xy":[0.4,0.17320508075688773]},{"pi":[0.1,0.1,0.8],"xy":[0.8500000000000001,0.08660254037844387]},{"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333],"xy":[0.5,0.28867513459481287]}],"fromXY":[{"xy":[0.4,0.17320508075688773],"pi":[0.20000000000000004,0.5,0.3]},{"xy":[0.8500000000000001,0.08660254037844387],"pi":[0.10000000000000002,0.09999999999999987,0.8]},{"xy":[0.5,0.28867513459481287],"pi":[0.33333333333333337,0.33333333333333326,0.3333333333333333]}],"edgeDistances":[{"pi":[0.2,0.5,0.3],"d":[0.17320508075688773,0.4330127018922193,0.25980762113533157]},{"pi":[0.1,0.1,0.8],"d":[0.08660254037844387,0.08660254037844387,0.6928203230275509]},{"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333],"d":[0.28867513459481287,0.28867513459481287,0.28867513459481287]}]};
      const RL_PALETTE = {"wong":{"black":"#000000","orange":"#E69F00","sky_blue":"#56B4E9","green":"#009E73","yellow":"#F0E442","blue":"#0072B2","vermillion":"#D55E00","purple":"#CC79A7"},"surface":"#ffffff","ink":{"primary":"#000000","secondary":"#4d4d4d","muted":"#8a8a8a"},"structure":{"grid":"#e6e6e6","edge":"#bdbdbd","field":"#9e9e9e"},"categorical":["#0072B2","#D55E00","#009E73","#E69F00","#CC79A7","#56B4E9","#F0E442","#000000"],"accent":{"primary":"#0072B2","secondary":"#D55E00"},"highlight":"#E69F00","font":{"serif":"Palatino, 'Palatino Linotype', 'Average', 'Book Antiqua', Georgia, serif"},"sequential":{"time":["#F6B14A","#D1461E","#7A0E0E"]}};

    <script id="rl-widget">
      (function () {
        "use strict";
        const Rend = RLRender, D = RLDyn, P = RL_PALETTE;
        D.selfTest(RL_FIXTURES);

        const TIME = P.sequential.time;
        const ETA = 0.3, STEPS = 110;

        // state: draggable start + editable top rows (a1) of each matrix
        let c0 = [0.9, 0.05, 0.05];
        let pid = [0.9, 0.1, 0.1];    // P(ID) row a1
        let pood = [0.9, 0.1, 0.9];   // P(OOD) row a1

        // ---- colour ramp (mirrors rl_dynamics.palette.ramp) ----
        function hexToRgb(h) { h = h.replace("#", ""); return [0, 2, 4].map((i) => parseInt(h.substr(i, 2), 16)); }
        function rgbToHex(c) { return "#" + c.map((v) => Math.round(v).toString(16).padStart(2, "0")).join(""); }
        function ramp(t) {
          t = Math.min(1, Math.max(0, t));
          const s = TIME, n = s.length - 1, f = t * n, i = Math.min(n - 1, Math.floor(f)), u = f - i;
          const a = hexToRgb(s[i]), b = hexToRgb(s[i + 1]);
          return rgbToHex(a.map((av, k) => av + (b[k] - av) * u));
        }

        // ---- geometry ----
        const H = D.H, S = 150, RW = 108, RH = H * S;
        const OX_T = 44, BAND_T = 44;
        const OX_ID = OX_T + S + 66, OX_OOD = OX_ID + RW + 58;
        const CB_X = OX_OOD + RW + 44, CBW = 13;
        const BOX_W = CB_X + CBW + 50, BOX_H = BAND_T + RH + 60;

        const triXY = (c) => [c[0] * D.V[0][0] + c[1] * D.V[1][0] + c[2] * D.V[2][0],
                              c[0] * D.V[0][1] + c[1] * D.V[1][1] + c[2] * D.V[2][1]];
        const triProj = (c) => { const xy = triXY(c); return [OX_T + xy[0] * S, BAND_T + (H - xy[1]) * S]; };
        const triUnproj = (px, py) => [(px - OX_T) / S, H - (py - BAND_T) / S];

        // ---- deterministic cognition trajectory (trained on P_ID) ----
        function trajectory() {
          let L = c0.map((p) => Math.log(Math.max(p, 1e-12)));
          const Rt = pid.map((x) => 1 - x);           // effective rewards = success probs
          const out = [D.softmax(L)];
          for (let t = 0; t < STEPS; t++) {
            const s = D.softmax(L);
            L = D.logitStep(L, D.fullGradient(s, Rt), ETA, null);
            out.push(D.softmax(L));
          }
          return out;
        }

        function timePath(pts, w) {
          let s = "";
          for (let k = 0; k < pts.length - 1; k++)
            s += Rend.line(pts[k][0], pts[k][1], pts[k + 1][0], pts[k + 1][1],
              { stroke: ramp((k + 0.5) / (pts.length - 1)), stroke_width: w, stroke_linecap: "round", stroke_linejoin: "round" });
          return s;
        }

        function panel(ox, top, xvals, title) {
          const edge = P.structure.edge, sec = P.ink.secondary, muted = P.ink.muted;
          const bot = BAND_T + RH;
          let s = Rend.text(ox + RW / 2, top - 24, title, { fill: P.ink.primary, font_size: 13, font_weight: 600, text_anchor: "middle" });
          // bottom action axis
          s += Rend.line(ox, bot, ox + RW, bot, { stroke: edge, stroke_width: 1.2 });
          // short time arrow (mid-left), not touching the axis
          const yc = BAND_T + RH / 2, ax = ox - 12;
          s += Rend.line(ax, yc - 18, ax, yc + 14, { stroke: muted, stroke_width: 1.1 });
          s += Rend.polygon([[ax, yc + 20], [ax - 3, yc + 13], [ax + 3, yc + 13]], { fill: muted });
          s += Rend.text(ax - 8, yc, "time", { fill: muted, font_size: 10.5, text_anchor: "middle", dominant_baseline: "middle", transform: "rotate(-90 " + (ax - 8) + " " + yc + ")" });
          // trajectory
          const pts = xvals.map((x, t) => [ox + x * RW, BAND_T + (t / STEPS) * RH]);
          s += timePath(pts, 2.6);
          s += Rend.circle(pts[0][0], pts[0][1], 3, { fill: ramp(0), stroke: P.surface, stroke_width: 1 });
          // x labels
          s += Rend.text(ox, bot + 14, "a₁", { fill: sec, font_size: 11.5, text_anchor: "middle" });
          s += Rend.text(ox + RW, bot + 14, "a₂", { fill: sec, font_size: 11.5, text_anchor: "middle" });
          s += Rend.text(ox, bot + 27, "fail", { fill: muted, font_size: 9.5, text_anchor: "middle" });
          s += Rend.text(ox + RW, bot + 27, "success", { fill: muted, font_size: 9.5, text_anchor: "middle" });
          return s;
        }

        function render() {
          const traj = trajectory();
          const edge = P.structure.edge, sec = P.ink.secondary, muted = P.ink.muted;
          let s = "";

          // ---- cognition simplex ----
          const V = [triProj([1, 0, 0]), triProj([0, 1, 0]), triProj([0, 0, 1])];
          s += Rend.polygon(V, { fill: P.surface, stroke: edge, stroke_width: 1.5, stroke_linejoin: "round" });
          s += Rend.text(OX_T + S / 2, BAND_T - 24, "Cognition", { fill: P.ink.primary, font_size: 13, font_weight: 600, text_anchor: "middle" });
          const vlab = ["c₁", "c₂", "c₃"], voff = [[0, -13], [-9, 13], [9, 13]];
          for (let i = 0; i < 3; i++)
            s += Rend.text(V[i][0] + voff[i][0], V[i][1] + voff[i][1], vlab[i], { fill: sec, font_size: 12.5, font_weight: 600, text_anchor: "middle", dominant_baseline: "middle" });
          const tp = traj.map(triProj);
          s += timePath(tp, 2.6);
          s += Rend.circle(tp[0][0], tp[0][1], 6.5, { fill: "none", stroke: P.surface, stroke_width: 3 });
          s += Rend.circle(tp[0][0], tp[0][1], 5, { fill: ramp(0), stroke: P.ink.primary, stroke_width: 1.2 });

          // ---- ID / OOD panels ----
          const a2id = traj.map((c) => c.reduce((a, ck, k) => a + (1 - pid[k]) * ck, 0));
          const a2ood = traj.map((c) => c.reduce((a, ck, k) => a + (1 - pood[k]) * ck, 0));
          s += panel(OX_ID, BAND_T, a2id, "ID action choice");
          s += panel(OX_OOD, BAND_T, a2ood, "OOD action choice");

          // ---- colourbar ----
          const gstops = [0, .25, .5, .75, 1].map((o) => '<stop offset="' + o + '" stop-color="' + ramp(o) + '"/>').join("");
          s += '<defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">' + gstops + '</linearGradient></defs>';
          s += '<rect x="' + CB_X + '" y="' + BAND_T + '" width="' + CBW + '" height="' + RH + '" fill="url(#tg)" stroke="' + edge + '" stroke-width="1" rx="' + (CBW / 2) + '" ry="' + (CBW / 2) + '"/>';
          s += Rend.text(CB_X + CBW / 2, BAND_T - 7, "early", { fill: muted, font_size: 9.5, text_anchor: "middle" });
          s += Rend.text(CB_X + CBW / 2, BAND_T + RH + 13, "late", { fill: muted, font_size: 9.5, text_anchor: "middle" });

          stage.innerHTML = '<svg font-family="' + P.font.serif + '" viewBox="0 0 ' + BOX_W + ' ' + BOX_H + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="cognition ID vs OOD">' + s + "</svg>";
        }

        // ---- dragging the start point (only within the simplex) ----
        const stage = document.getElementById("fig");
        let dragging = false;
        const svgEl = () => stage.querySelector("svg");
        function toBox(ev) {
          const r = svgEl().getBoundingClientRect();
          const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
          const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
          return [(cx - r.left) * (BOX_W / r.width), (cy - r.top) * (BOX_H / r.height)];
        }
        function inSimplex(px, py) {
          const c = D.fromXY(...triUnproj(px, py));
          return c.every((v) => v >= -0.02);
        }
        function setStart(ev) {
          const [px, py] = toBox(ev);
          c0 = D.clampToSimplex(D.fromXY(...triUnproj(px, py)));
          render();
        }
        stage.addEventListener("pointerdown", (ev) => {
          const [px, py] = toBox(ev);
          if (!inSimplex(px, py)) return;
          dragging = true; setStart(ev); ev.preventDefault();
        });
        window.addEventListener("pointermove", (ev) => { if (dragging) { setStart(ev); ev.preventDefault(); } });
        window.addEventListener("pointerup", () => { dragging = false; });

        // ---- matrix inputs ----
        function clamp01(v) { v = parseFloat(v); return isFinite(v) ? Math.min(1, Math.max(0, v)) : 0; }
        function bindMatrix(prefix, arr) {
          for (let k = 0; k < 3; k++) {
            const inp = document.getElementById(prefix + "-" + k);
            const der = document.getElementById(prefix + "-d" + k);
            inp.addEventListener("input", () => {
              const raw = parseFloat(inp.value);
              arr[k] = clamp01(inp.value);
              if (isFinite(raw) && (raw < 0 || raw > 1)) inp.value = String(arr[k]);  // snap out-of-range back into [0,1]
              der.textContent = (Math.round((1 - arr[k]) * 100) / 100).toString();
              render();
            });
          }
        }
        bindMatrix("id", pid);
        bindMatrix("ood", pood);

        render();
      })();
    </script>
  </body>
</html>
