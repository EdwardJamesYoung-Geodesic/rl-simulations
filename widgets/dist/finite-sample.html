<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finite-sample RL drift</title>
    <style>
      html, body { margin: 0; background: #ffffff; }
      #wrap {
        max-width: 500px;
        margin: 0 auto;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        color: #222;
      }
      #fig svg { display: block; width: 100%; height: auto; touch-action: none; cursor: grab; }
      #fig svg.dragging { cursor: grabbing; }
      #hint { font-size: 12.5px; color: #6b6b6b; text-align: center; margin: 2px 0 10px; }
      #controls {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 9px 12px;
        align-items: center;
        padding: 4px 8px 2px;
      }
      #controls label { font-size: 13px; font-weight: 600; white-space: nowrap; }
      #controls output { font-size: 13px; font-variant-numeric: tabular-nums; text-align: right; min-width: 2.6em; }
      #controls input[type="range"] { width: 100%; accent-color: #0072B2; }
      #rewards {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 8px 2px; font-size: 13px; font-weight: 600;
      }
      #rewards .rboxes { display: flex; gap: 10px; }
      #rewards .rboxes label { display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
      #rewards input[type="number"] {
        width: 3.4em; font: 13px system-ui, sans-serif;
        padding: 3px 4px; border: 1px solid #cfcfcf; border-radius: 5px;
      }
      #bar { display: flex; justify-content: flex-end; padding: 8px; }
      #replay {
        font: 600 13px system-ui, sans-serif;
        color: #ffffff; background: #0072B2; border: none;
        border-radius: 6px; padding: 6px 14px; cursor: pointer;
      }
      #replay:hover { background: #005b8f; }
      #replay:focus-visible { outline: 2px solid #0072B2; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="fig"></div>
      <div id="hint">Drag the point to choose where training starts.</div>
      <div id="controls">
        <label for="c-G">Group size <i>G</i></label>
        <input id="c-G" type="range" min="2" max="64" step="1" value="8" />
        <output id="v-G">8</output>

        <label for="c-eta">Learning rate <i>η</i></label>
        <input id="c-eta" type="range" min="0.05" max="2" step="0.05" value="1.2" />
        <output id="v-eta">1.20</output>

        <label for="c-steps">Steps</label>
        <input id="c-steps" type="range" min="5" max="200" step="1" value="25" />
        <output id="v-steps">25</output>

        <label for="c-N">Rollouts</label>
        <input id="c-N" type="range" min="1" max="50" step="1" value="20" />
        <output id="v-N">20</output>
      </div>
      <div id="rewards">
        <span>Rewards</span>
        <div class="rboxes">
          <label>R₁ <input id="c-R1" type="number" step="0.1" min="-5" max="5" value="0" /></label>
          <label>R₂ <input id="c-R2" type="number" step="0.1" min="-5" max="5" value="1" /></label>
          <label>R₃ <input id="c-R3" type="number" step="0.1" min="-5" max="5" value="1" /></label>
        </div>
      </div>
      <div id="bar"><button id="replay" type="button">Replay</button></div>
    </div>

    <script id="rl-core">/*
 * rl-dynamics — JS core.
 *
 * A small, dependency-free mirror of the deterministic maths in the Python
 * package `rl_dynamics` (policy gradients + N=3 simplex geometry), so the
 * interactive widgets compute the same quantities as the figure generators.
 *
 * The Python package is the source of truth; `RLDyn.selfTest(fixtures)` checks
 * this mirror against Python-generated fixtures at load time (see
 * widgets/gen_fixtures.py). Stochastic RLOO *sampling* is intentionally not
 * mirrored (RNG streams differ across implementations); the RLOO *formula* is,
 * via `rlooFromCounts`.
 */
const RLDyn = (function () {
  "use strict";

  // ---- policy / gradients ------------------------------------------------
  function softmax(L) {
    const m = Math.max.apply(null, L);
    const e = L.map((x) => Math.exp(x - m));
    const s = e.reduce((a, b) => a + b, 0);
    return e.map((x) => x / s);
  }

  function expectedReward(pi, R) {
    return pi.reduce((a, p, i) => a + p * R[i], 0);
  }

  function fullGradient(pi, R) {
    const er = expectedReward(pi, R);
    return pi.map((p, i) => p * (R[i] - er));
  }

  // ghat_i = (1/G) N_i (R_i - Rbar),  Rbar = (1/G) sum_i N_i R_i
  function rlooFromCounts(counts, R) {
    const G = counts.reduce((a, b) => a + b, 0);
    const Rbar = counts.reduce((a, c, i) => a + c * R[i], 0) / G;
    const ghat = counts.map((c, i) => (c * (R[i] - Rbar)) / G);
    return { ghat, Rbar };
  }

  function _matVec(M, v) {
    return M.map((row) => row.reduce((a, m, k) => a + m * v[k], 0));
  }
  function _matTVec(M, v) {
    // (M^T v)_k = sum_i M[i][k] v[i]
    const out = new Array(M[0].length).fill(0);
    for (let i = 0; i < M.length; i++)
      for (let k = 0; k < M[i].length; k++) out[k] += M[i][k] * v[i];
    return out;
  }

  // L <- L + eta A A^T ghat ; A === null is the identity fast path.
  function logitStep(L, ghat, eta, A) {
    if (!A) return L.map((l, i) => l + eta * ghat[i]);
    const coupled = _matVec(A, _matTVec(A, ghat));
    return L.map((l, i) => l + eta * coupled[i]);
  }

  // ---- N=3 simplex geometry ---------------------------------------------
  const H = Math.sqrt(3) / 2; // triangle height
  const V = [
    [0.5, H],
    [0.0, 0.0],
    [1.0, 0.0],
  ]; // vertices v1 (top), v2 (bottom-left), v3 (bottom-right)

  function toXY(pi) {
    return [
      pi[0] * V[0][0] + pi[1] * V[1][0] + pi[2] * V[2][0],
      pi[0] * V[0][1] + pi[1] * V[1][1] + pi[2] * V[2][1],
    ];
  }

  // Barycentric coordinates of (x, y) w.r.t. the reference triangle.
  function fromXY(x, y) {
    const [x1, y1] = V[0];
    const [x2, y2] = V[1];
    const [x3, y3] = V[2];
    const det = (y2 - y3) * (x1 - x3) + (x3 - x2) * (y1 - y3);
    const a = ((y2 - y3) * (x - x3) + (x3 - x2) * (y - y3)) / det;
    const b = ((y3 - y1) * (x - x3) + (x1 - x3) * (y - y3)) / det;
    return [a, b, 1 - a - b];
  }

  // Orthogonal distance to the edge opposite each vertex: pi_i * H.
  function edgeDistances(pi) {
    return pi.map((p) => p * H);
  }

  // Foot of the perpendicular from P onto the line through A and B.
  function footOnEdge(P, A, B) {
    const abx = B[0] - A[0],
      aby = B[1] - A[1];
    const t = ((P[0] - A[0]) * abx + (P[1] - A[1]) * aby) / (abx * abx + aby * aby);
    return [A[0] + t * abx, A[1] + t * aby];
  }

  // The edge (as [A, B] vertices) opposite vertex i.
  function oppositeEdge(i) {
    const others = [0, 1, 2].filter((k) => k !== i);
    return [V[others[0]], V[others[1]]];
  }

  // Project a point onto the probability simplex (clamp negatives, renormalise).
  function clampToSimplex(pi) {
    const c = pi.map((p) => Math.max(0, p));
    const s = c.reduce((a, b) => a + b, 0);
    if (s <= 0) return [1 / 3, 1 / 3, 1 / 3];
    return c.map((p) => p / s);
  }

  // ---- parity self-test --------------------------------------------------
  function _close(a, b, tol) {
    tol = tol || 1e-9;
    if (Array.isArray(a))
      return a.length === b.length && a.every((x, i) => _close(x, b[i], tol));
    return Math.abs(a - b) <= tol;
  }

  function selfTest(fx) {
    const fails = [];
    const check = (name, got, want) => {
      if (!_close(got, want, 1e-6)) fails.push({ name, got, want });
    };
    for (const c of fx.softmax) check("softmax", softmax(c.L), c.pi);
    for (const c of fx.fullGradient)
      check("fullGradient", fullGradient(c.pi, c.R), c.ghat);
    for (const c of fx.rlooFromCounts) {
      const r = rlooFromCounts(c.counts, c.R);
      check("rloo.ghat", r.ghat, c.ghat);
      check("rloo.Rbar", r.Rbar, c.Rbar);
    }
    for (const c of fx.logitStep)
      check("logitStep", logitStep(c.L, c.ghat, c.eta, c.A || null), c.out);
    for (const c of fx.toXY) check("toXY", toXY(c.pi), c.xy);
    for (const c of fx.fromXY) check("fromXY", fromXY(c.xy[0], c.xy[1]), c.pi);
    for (const c of fx.edgeDistances)
      check("edgeDistances", edgeDistances(c.pi), c.d);
    const ok = fails.length === 0;
    if (ok) console.log("[RLDyn] self-test passed (JS matches Python reference)");
    else console.error("[RLDyn] self-test FAILED", fails);
    return { ok, fails };
  }

  return {
    softmax,
    expectedReward,
    fullGradient,
    rlooFromCounts,
    logitStep,
    H,
    V,
    toXY,
    fromXY,
    edgeDistances,
    footOnEdge,
    oppositeEdge,
    clampToSimplex,
    selfTest,
  };
})();

if (typeof module !== "undefined" && module.exports) module.exports = RLDyn;
</script>
    <script id="rl-render">/*
 * rl-dynamics — SVG string builders for widgets.
 *
 * Mirrors the conventions of the Python `rl_dynamics.svg` module: each helper
 * returns an SVG element as a string, which the widget assembles and injects
 * via innerHTML. Keeps rendering declarative and re-runnable on every state
 * change.
 */
const RLRender = (function () {
  "use strict";

  function fmt(x, ndigits) {
    if (ndigits === undefined) ndigits = 3;
    if (x === 0) x = 0;
    let s = x.toFixed(ndigits).replace(/\.?0+$/, "");
    return s === "" || s === "-" ? "0" : s;
  }

  function attrs(o) {
    const parts = [];
    for (const key in o) {
      const val = o[key];
      if (val === null || val === undefined) continue;
      const name = key.replace(/_/g, "-");
      parts.push(`${name}="${typeof val === "number" ? fmt(val) : val}"`);
    }
    return parts.join(" ");
  }

  const pts = (arr) => arr.map((p) => `${fmt(p[0])},${fmt(p[1])}`).join(" ");

  return {
    fmt,
    attrs,
    line: (x1, y1, x2, y2, o) =>
      `<line ${attrs(Object.assign({ x1, y1, x2, y2 }, o))} />`,
    polyline: (arr, o) =>
      `<polyline points="${pts(arr)}" ${attrs(Object.assign({ fill: "none" }, o))} />`,
    polygon: (arr, o) => `<polygon points="${pts(arr)}" ${attrs(o)} />`,
    path: (d, o) => `<path d="${d}" ${attrs(o)} />`,
    circle: (cx, cy, r, o) =>
      `<circle ${attrs(Object.assign({ cx, cy, r }, o))} />`,
    text: (x, y, s, o) => `<text ${attrs(Object.assign({ x, y }, o))}>${s}</text>`,
    g: (body, o) => `<g ${attrs(o)}>${body}</g>`,
  };
})();

if (typeof module !== "undefined" && module.exports) module.exports = RLRender;
</script>
    <script id="rl-data">
      const RL_FIXTURES = {"softmax":[{"L":[2.0,-1.0,0.5],"pi":[0.7855970345892759,0.039112573270687456,0.1752903921400367]},{"L":[0.0,0.0,0.0],"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333]},{"L":[3.0,3.0,-2.0],"pi":[0.4983211691867487,0.4983211691867487,0.0033576616265026146]}],"fullGradient":[{"pi":[0.9,0.05,0.05],"R":[0.0,1.0,1.0],"ghat":[-0.09000000000000001,0.045000000000000005,0.045000000000000005]},{"pi":[0.2,0.5,0.3],"R":[0.0,1.0,2.0],"ghat":[-0.22000000000000003,-0.050000000000000044,0.26999999999999996]}],"rlooFromCounts":[{"counts":[5,2,1],"R":[0.0,1.0,1.0],"ghat":[-0.234375,0.15625,0.078125],"Rbar":0.375},{"counts":[3,3,2],"R":[0.0,1.0,2.0],"ghat":[-0.328125,0.046875,0.28125],"Rbar":0.875}],"logitStep":[{"L":[0.2,-0.1,0.5],"ghat":[0.1,-0.05,-0.05],"eta":0.3,"A":null,"out":[0.23,-0.115,0.485]},{"L":[0.2,-0.1,0.5],"ghat":[0.1,-0.05,-0.05],"eta":0.3,"A":[[1.0,0.5,0.0],[0.0,1.0,0.0],[0.2,0.0,1.0]],"out":[0.227,-0.1,0.4904]}],"toXY":[{"pi":[0.2,0.5,0.3],"xy":[0.4,0.17320508075688773]},{"pi":[0.1,0.1,0.8],"xy":[0.8500000000000001,0.08660254037844387]},{"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333],"xy":[0.5,0.28867513459481287]}],"fromXY":[{"xy":[0.4,0.17320508075688773],"pi":[0.20000000000000004,0.5,0.3]},{"xy":[0.8500000000000001,0.08660254037844387],"pi":[0.10000000000000002,0.09999999999999987,0.8]},{"xy":[0.5,0.28867513459481287],"pi":[0.33333333333333337,0.33333333333333326,0.3333333333333333]}],"edgeDistances":[{"pi":[0.2,0.5,0.3],"d":[0.17320508075688773,0.4330127018922193,0.25980762113533157]},{"pi":[0.1,0.1,0.8],"d":[0.08660254037844387,0.08660254037844387,0.6928203230275509]},{"pi":[0.3333333333333333,0.3333333333333333,0.3333333333333333],"d":[0.28867513459481287,0.28867513459481287,0.28867513459481287]}]};
      const RL_PALETTE = {"wong":{"black":"#000000","orange":"#E69F00","sky_blue":"#56B4E9","green":"#009E73","yellow":"#F0E442","blue":"#0072B2","vermillion":"#D55E00","purple":"#CC79A7"},"surface":"#ffffff","ink":{"primary":"#000000","secondary":"#4d4d4d","muted":"#8a8a8a"},"structure":{"grid":"#e6e6e6","edge":"#bdbdbd","field":"#9e9e9e"},"categorical":["#0072B2","#D55E00","#009E73","#E69F00","#CC79A7","#56B4E9","#F0E442","#000000"],"accent":{"primary":"#0072B2","secondary":"#D55E00"},"highlight":"#E69F00","font":{"serif":"Palatino, 'Palatino Linotype', 'Average', 'Book Antiqua', Georgia, serif"},"sequential":{"time":["#F6B14A","#D1461E","#7A0E0E"]}};

    <script id="rl-widget">
      (function () {
        "use strict";
        const Rend = RLRender, D = RLDyn, P = RL_PALETTE;

        // silent JS<->Python parity guard (logs to console only)
        D.selfTest(RL_FIXTURES);

        const TIME = P.sequential.time;          // light orange -> dark red ramp
        const BLUE = P.wong.blue;                // deterministic full-gradient path
        const SUBS = ["₁", "₂", "₃"];

        // ---- adjustable params + state --------------------------------------
        let G = 8, eta = 1.2, steps = 25, N = 20;
        let REW = [0.0, 1.0, 1.0];
        let startPi = [0.9, 0.05, 0.05];

        // ---- colour ramp (mirrors rl_dynamics.palette.ramp) -----------------
        function hexToRgb(h) {
          h = h.replace("#", "");
          return [0, 2, 4].map((i) => parseInt(h.substr(i, 2), 16));
        }
        function rgbToHex(c) {
          return "#" + c.map((v) => Math.round(v).toString(16).padStart(2, "0")).join("");
        }
        function ramp(stops, t) {
          t = Math.min(1, Math.max(0, t));
          const n = stops.length - 1, f = t * n;
          const i = Math.min(n - 1, Math.floor(f)), u = f - i;
          const a = hexToRgb(stops[i]), b = hexToRgb(stops[i + 1]);
          return rgbToHex(a.map((av, k) => av + (b[k] - av) * u));
        }
        function fmtNum(x) { return isFinite(x) ? String(Math.round(x * 100) / 100) : "0"; }

        // ---- geometry / projection ------------------------------------------
        const BOX = 500, PAD = 60;
        const scale = BOX - 2 * PAD;
        const triH = D.H * scale;
        const ox = PAD;
        const oy = PAD + (BOX - 2 * PAD - triH) / 2;
        const proj = (p) => [ox + p[0] * scale, oy + (D.H - p[1]) * scale];
        const unproj = (px, py) => [(px - ox) / scale, D.H - (py - oy) / scale];
        const Vpix = D.V.map(proj);

        const stage = document.getElementById("fig");
        const el = (id) => document.getElementById(id);

        // ---- static shell + vertex labels -----------------------------------
        function labelsSVG() {
          const off = [ [0, -16], [-6, 24], [6, 24] ];
          let s = "";
          for (let i = 0; i < 3; i++) {
            s += Rend.text(Vpix[i][0] + off[i][0], Vpix[i][1] + off[i][1],
              "R" + SUBS[i] + " = " + fmtNum(REW[i]), {
              fill: P.ink.secondary, font_size: 13, font_weight: 600,
              text_anchor: "middle", dominant_baseline: "middle",
            });
          }
          return s;
        }
        function updateLabels() { el("labels").innerHTML = labelsSVG(); }

        function shell() {
          const tri = Rend.polygon(Vpix, {
            fill: P.surface, stroke: P.structure.edge, stroke_width: 1.75,
            stroke_linejoin: "round",
          });
          stage.innerHTML =
            '<svg viewBox="0 0 ' + BOX + " " + BOX +
            '" xmlns="http://www.w3.org/2000/svg" role="img" ' +
            'aria-label="finite-sample RL rollouts on the probability simplex">' +
            tri + '<g id="labels">' + labelsSVG() + '</g>' +
            '<g id="traj"></g><g id="det"></g><g id="marker"></g></svg>';
          drawMarker();
        }

        function drawMarker() {
          const Pp = proj(D.toXY(startPi));
          el("marker").innerHTML =
            Rend.circle(Pp[0], Pp[1], 8.5, { fill: "none", stroke: P.surface, stroke_width: 3.5 }) +
            Rend.circle(Pp[0], Pp[1], 6.5, { fill: ramp(TIME, 0), stroke: P.ink.primary, stroke_width: 1.4 });
        }

        // ---- rollouts -> pixel points per step ------------------------------
        function sampleCat(pi) {
          const u = Math.random();
          let c = 0;
          for (let i = 0; i < pi.length; i++) { c += pi[i]; if (u < c) return i; }
          return pi.length - 1;
        }
        function rollout() {                       // one stochastic RLOO run
          let L = startPi.map((p) => Math.log(Math.max(p, 1e-12)));
          const pix = [proj(D.toXY(D.softmax(L)))];
          for (let t = 0; t < steps; t++) {
            const pi = D.softmax(L);
            const counts = [0, 0, 0];
            for (let g = 0; g < G; g++) counts[sampleCat(pi)]++;
            const { ghat } = D.rlooFromCounts(counts, REW);
            L = D.logitStep(L, ghat, eta, null);
            pix.push(proj(D.toXY(D.softmax(L))));
          }
          return pix;
        }
        function detPath() {                        // deterministic full-gradient run
          let L = startPi.map((p) => Math.log(Math.max(p, 1e-12)));
          const pix = [proj(D.toXY(D.softmax(L)))];
          for (let t = 0; t < steps; t++) {
            const pi = D.softmax(L);
            L = D.logitStep(L, D.fullGradient(pi, REW), eta, null);
            pix.push(proj(D.toXY(D.softmax(L))));
          }
          return pix;
        }

        // ---- animate rollouts + deterministic path growing together --------
        let raf = null;
        function stopAnim() { if (raf) { cancelAnimationFrame(raf); raf = null; } }
        function run() {
          stopAnim();
          const trajG = el("traj"), detG = el("det");
          trajG.innerHTML = ""; detG.innerHTML = "";
          const paths = [];
          for (let i = 0; i < N; i++) paths.push(rollout());
          const det = detPath();
          const inc = Math.max(1, Math.round(steps / 90));
          let shown = 0;
          function frame() {
            const next = Math.min(steps, shown + inc);
            let buf = "";
            for (let i = 0; i < N; i++) {
              const p = paths[i];
              for (let s = shown; s < next; s++) {
                buf += Rend.line(p[s][0], p[s][1], p[s + 1][0], p[s + 1][1], {
                  stroke: ramp(TIME, (s + 0.5) / steps),
                  stroke_width: 1.8, stroke_linecap: "round", opacity: 0.82,
                });
              }
            }
            trajG.insertAdjacentHTML("beforeend", buf);
            detG.innerHTML = Rend.polyline(det.slice(0, next + 1), {
              stroke: BLUE, stroke_width: 3, stroke_linecap: "round", stroke_linejoin: "round",
            });
            shown = next;
            raf = shown < steps ? requestAnimationFrame(frame) : null;
          }
          frame();
        }

        // ---- dragging the start point ---------------------------------------
        let dragging = false;
        const svgEl = () => stage.querySelector("svg");
        function toBox(ev) {
          const rect = svgEl().getBoundingClientRect();
          const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
          const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
          return [(cx - rect.left) * (BOX / rect.width), (cy - rect.top) * (BOX / rect.height)];
        }
        function setFrom(ev) {
          const [px, py] = toBox(ev);
          startPi = D.clampToSimplex(D.fromXY(...unproj(px, py)));
          drawMarker();
        }
        stage.addEventListener("pointerdown", (ev) => {
          dragging = true;
          svgEl().classList.add("dragging");
          stopAnim();
          el("traj").innerHTML = ""; el("det").innerHTML = "";   // clear while repositioning
          setFrom(ev);
          ev.preventDefault();
        });
        window.addEventListener("pointermove", (ev) => { if (dragging) { setFrom(ev); ev.preventDefault(); } });
        window.addEventListener("pointerup", () => {
          if (!dragging) return;
          dragging = false;
          const e = svgEl(); if (e) e.classList.remove("dragging");
          run();                                                 // rollouts appear on release
        });

        // ---- controls -------------------------------------------------------
        const sliders = [
          ["c-G", "v-G", (v) => { G = +v; return String(G); }],
          ["c-eta", "v-eta", (v) => { eta = +v; return eta.toFixed(2); }],
          ["c-steps", "v-steps", (v) => { steps = +v; return String(steps); }],
          ["c-N", "v-N", (v) => { N = +v; return String(N); }],
        ];
        for (const [inId, outId, apply] of sliders) {
          const input = el(inId), out = el(outId);
          input.addEventListener("input", () => { out.textContent = apply(input.value); run(); });
        }
        [["c-R1", 0], ["c-R2", 1], ["c-R3", 2]].forEach(([id, idx]) => {
          el(id).addEventListener("input", () => {
            const v = parseFloat(el(id).value);
            REW[idx] = isFinite(v) ? v : 0;
            updateLabels();
            run();
          });
        });
        el("replay").addEventListener("click", run);

        // ---- go -------------------------------------------------------------
        shell();
        run();
      })();
    </script>
  </body>
</html>
